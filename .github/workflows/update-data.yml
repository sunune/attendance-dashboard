name: Update Attendance Data from Notion

on:
  schedule:
    - cron: '0 0 * * 1-5'   # KST 09:00 (UTC 00:00), 평일만
  workflow_dispatch:          # 수동 실행 가능

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch Notion data & generate data.json
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: |
          python3 << 'PYEOF'
          import json, urllib.request, os

          TOKEN = os.environ['NOTION_TOKEN']
          DB_ID = '672112f596f74ce8979687ebfd0438fc'
          EMPLOYEES = ['강성준', '이경희', '임재우']

          def parse_time(s):
              """'AM 08:00' / 'PM 01:30' → '08:00' / '13:30'"""
              parts = s.strip().split()
              ampm = parts[0].upper()
              hm   = parts[1].split(':')
              h, m = int(hm[0]), int(hm[1])
              if ampm == 'PM' and h != 12:
                  h += 12
              elif ampm == 'AM' and h == 12:
                  h = 0
              return f'{h:02d}:{m:02d}'

          def notion_query(cursor=None):
              url  = f'https://api.notion.com/v1/databases/{DB_ID}/query'
              body = {'page_size': 100}
              if cursor:
                  body['start_cursor'] = cursor
              req = urllib.request.Request(
                  url,
                  data=json.dumps(body).encode(),
                  headers={
                      'Authorization': f'Bearer {TOKEN}',
                      'Notion-Version': '2022-06-28',
                      'Content-Type': 'application/json',
                  },
                  method='POST'
              )
              with urllib.request.urlopen(req) as resp:
                  return json.loads(resp.read())

          # 페이지네이션으로 전체 결과 수집
          all_results = []
          cursor = None
          while True:
              data = notion_query(cursor)
              all_results.extend(data.get('results', []))
              if data.get('has_more'):
                  cursor = data.get('next_cursor')
              else:
                  break

          # 날짜별로 그룹화
          records_map = {}
          skipped = 0

          for result in all_results:
              props = result.get('properties', {})

              # 이름
              name_sel = props.get('이름', {}).get('select') or {}
              name = name_sel.get('name')

              # 날짜
              date_obj = props.get('날짜', {}).get('date') or {}
              date = date_obj.get('start', '')[:10]  # YYYY-MM-DD

              # 출근시간
              rt = props.get('출근시간', {}).get('rich_text', [])
              raw_time = rt[0]['text']['content'] if rt else None

              if not (name and date and raw_time):
                  skipped += 1
                  continue

              try:
                  time_24 = parse_time(raw_time)
              except Exception as e:
                  print(f'시간 파싱 실패: {raw_time!r} → {e}')
                  skipped += 1
                  continue

              if date not in records_map:
                  records_map[date] = {'date': date, 'arrivals': []}

              # 같은 날 같은 직원 중복 방지
              existing_names = {a['name'] for a in records_map[date]['arrivals']}
              if name not in existing_names:
                  records_map[date]['arrivals'].append({'name': name, 'time': time_24})

          records = sorted(records_map.values(), key=lambda r: r['date'])

          output = {
              'employees': EMPLOYEES,
              'records':   records,
              'updated_at': __import__('datetime').datetime.utcnow().strftime('%Y-%m-%dT%H:%M:%SZ'),
              'total_rows': len(all_results),
              'skipped':    skipped,
          }

          with open('data.json', 'w', encoding='utf-8') as f:
              json.dump(output, f, ensure_ascii=False, indent=2)

          print(f'✅ data.json 생성 완료: {len(records)}일 기록, {len(all_results)}행 처리, {skipped}행 스킵')
          PYEOF

      - name: Commit & push data.json
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add data.json
          git diff --staged --quiet && echo "변경사항 없음, 커밋 스킵" || \
            git commit -m "chore: update attendance data $(date -u +%Y-%m-%d) [skip ci]" && \
            git push
