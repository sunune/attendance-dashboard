name: Update Attendance Data from Notion

on:
  schedule:
    - cron: '0 * * * 1-5'   # 매시간 (평일)
  workflow_dispatch:          # 수동 실행 가능

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch today's Notion data & append to data.json
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: |
          python3 << 'PYEOF'
          import json, urllib.request, os
          from datetime import datetime, timezone, timedelta

          TOKEN     = os.environ['NOTION_TOKEN']
          DB_ID     = '672112f596f74ce8979687ebfd0438fc'
          EMPLOYEES = ['강성준', '이경희', '임재우']

          # KST 오늘 날짜
          KST    = timezone(timedelta(hours=9))
          now_kst = datetime.now(KST)
          TODAY  = now_kst.strftime('%Y-%m-%d')
          print(f'오늘 날짜 (KST): {TODAY}')

          # 주말이면 스킵
          if now_kst.weekday() >= 5:
              print(f'주말({["월","화","수","목","금","토","일"][now_kst.weekday()]})이므로 처리하지 않습니다.')
              exit(0)

          def parse_time(s):
              parts = s.strip().split()
              ampm  = parts[0].upper()
              h, m  = map(int, parts[1].split(':'))
              if ampm == 'PM' and h != 12:
                  h += 12
              elif ampm == 'AM' and h == 12:
                  h = 0
              return f'{h:02d}:{m:02d}'

          def notion_query(cursor=None):
              url  = f'https://api.notion.com/v1/databases/{DB_ID}/query'
              body = {'page_size': 100}
              if cursor:
                  body['start_cursor'] = cursor
              req = urllib.request.Request(
                  url,
                  data=json.dumps(body).encode(),
                  headers={
                      'Authorization': f'Bearer {TOKEN}',
                      'Notion-Version': '2022-06-28',
                      'Content-Type': 'application/json',
                  },
                  method='POST'
              )
              with urllib.request.urlopen(req) as resp:
                  return json.loads(resp.read())

          # Notion에서 오늘 날짜 행만 파싱
          today_arrivals = []
          skipped = 0
          cursor  = None

          while True:
              data = notion_query(cursor)
              for result in data.get('results', []):
                  props    = result.get('properties', {})
                  name_sel = props.get('이름', {}).get('select') or {}
                  name     = name_sel.get('name')
                  date_obj = props.get('날짜', {}).get('date') or {}
                  date     = date_obj.get('start', '')[:10]
                  rt       = props.get('출근시간', {}).get('rich_text', [])
                  raw_time = rt[0]['text']['content'] if rt else None

                  if date != TODAY:
                      continue
                  if not (name and raw_time):
                      skipped += 1
                      continue
                  try:
                      today_arrivals.append({'name': name, 'time': parse_time(raw_time)})
                  except Exception as e:
                      print(f'시간 파싱 실패: {raw_time!r} → {e}')
                      skipped += 1

              if data.get('has_more'):
                  cursor = data.get('next_cursor')
              else:
                  break

          print(f'Notion 오늘 데이터: {len(today_arrivals)}행, 스킵: {skipped}')

          # 기존 data.json 로드
          try:
              with open('data.json', encoding='utf-8') as f:
                  existing = json.load(f)
          except Exception:
              existing = {'employees': EMPLOYEES, 'records': []}

          # 오늘 레코드를 기존에 upsert (같은 날짜면 덮어쓰기)
          records_map = {r['date']: r for r in existing.get('records', [])}

          if today_arrivals:
              records_map[TODAY] = {'date': TODAY, 'arrivals': today_arrivals}
              print(f'data.json에 {TODAY} 데이터 upsert 완료')
          else:
              print(f'오늘({TODAY}) Notion 데이터 없음 — data.json 유지')

          output = {
              'employees':  EMPLOYEES,
              'records':    sorted(records_map.values(), key=lambda r: r['date']),
              'updated_at': datetime.now(timezone.utc).strftime('%Y-%m-%dT%H:%M:%SZ'),
          }

          with open('data.json', 'w', encoding='utf-8') as f:
              json.dump(output, f, ensure_ascii=False, indent=2)

          print(f'✅ data.json 저장 완료: 총 {len(output["records"])}일 기록')
          PYEOF

      - name: Commit & push data.json
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add data.json
          git diff --staged --quiet && echo "변경사항 없음, 커밋 스킵" || \
            git commit -m "chore: update attendance data $(date -u +%Y-%m-%d) [skip ci]" && \
            git push
