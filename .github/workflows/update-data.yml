name: Update Attendance Data from Notion

on:
  schedule:
    - cron: '0 * * * 1-5'   # 매시간 (평일)
  workflow_dispatch:          # 수동 실행 가능

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch Notion data & upsert to data.json
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: |
          python3 << 'PYEOF'
          import json, urllib.request, os
          from datetime import datetime, timezone, timedelta
          from collections import defaultdict

          TOKEN     = os.environ['NOTION_TOKEN']
          DB_ID     = '672112f596f74ce8979687ebfd0438fc'
          EMPLOYEES = ['강성준', '이경희', '임재우']

          KST     = timezone(timedelta(hours=9))
          now_kst = datetime.now(KST)

          # 주말이면 스킵
          if now_kst.weekday() >= 5:
              print(f'주말({["월","화","수","목","금","토","일"][now_kst.weekday()]})이므로 처리하지 않습니다.')
              exit(0)

          def parse_time(s):
              parts = s.strip().split()
              ampm  = parts[0].upper()
              h, m  = map(int, parts[1].split(':'))
              if ampm == 'PM' and h != 12: h += 12
              elif ampm == 'AM' and h == 12: h = 0
              return f'{h:02d}:{m:02d}'

          # Notion DB의 현재 3행 읽기 (고정 틀)
          url = f'https://api.notion.com/v1/databases/{DB_ID}/query'
          req = urllib.request.Request(
              url,
              data=json.dumps({'page_size': 10}).encode(),
              headers={
                  'Authorization': f'Bearer {TOKEN}',
                  'Notion-Version': '2022-06-28',
                  'Content-Type': 'application/json',
              },
              method='POST'
          )
          with urllib.request.urlopen(req) as resp:
              data = json.loads(resp.read())

          date_arrivals = defaultdict(list)
          date_absences = defaultdict(list)
          for result in data.get('results', []):
              props    = result.get('properties', {})
              name_sel = props.get('이름', {}).get('select') or {}
              name     = name_sel.get('name')
              date_obj = props.get('날짜', {}).get('date') or {}
              date     = date_obj.get('start', '')[:10]
              rt       = props.get('출근시간', {}).get('rich_text', [])
              raw_time = rt[0]['text']['content'] if rt else None
              bigo_rt  = props.get('비고', {}).get('rich_text', [])
              bigo     = bigo_rt[0]['text']['content'].strip() if bigo_rt else ''

              if not (name and date):
                  continue

              if bigo == '연차':
                  date_absences[date].append({'name': name, 'type': '연차'})
                  print(f'연차: {name} {date}')
              elif raw_time:
                  try:
                      date_arrivals[date].append({'name': name, 'time': parse_time(raw_time)})
                  except Exception as e:
                      print(f'시간 파싱 실패: {raw_time!r} → {e}')
              else:
                  print(f'스킵: name={name}, date={date}, time={raw_time}, bigo={bigo}')

          print(f'Notion에서 읽은 데이터: 출근 {sum(len(v) for v in date_arrivals.values())}행, 연차 {sum(len(v) for v in date_absences.values())}행')

          # 기존 data.json 로드 후 upsert
          try:
              with open('data.json', encoding='utf-8') as f:
                  existing = json.load(f)
          except Exception:
              existing = {'employees': EMPLOYEES, 'records': []}

          records_map = {r['date']: r for r in existing.get('records', [])}

          # 출근 기록 upsert (날짜별로 arrivals 교체)
          for date, arrivals in date_arrivals.items():
              rec = records_map.setdefault(date, {'date': date})
              rec['arrivals'] = arrivals
              print(f'upsert 출근: {date} → {arrivals}')

          # 연차 기록 upsert (날짜별로 absences 교체)
          for date, absences in date_absences.items():
              rec = records_map.setdefault(date, {'date': date})
              rec['absences'] = absences
              print(f'upsert 연차: {date} → {absences}')

          output = {
              'employees':  EMPLOYEES,
              'records':    sorted(records_map.values(), key=lambda r: r['date']),
              'updated_at': datetime.now(timezone.utc).strftime('%Y-%m-%dT%H:%M:%SZ'),
          }

          with open('data.json', 'w', encoding='utf-8') as f:
              json.dump(output, f, ensure_ascii=False, indent=2)

          print(f'✅ data.json 저장 완료: 총 {len(output["records"])}일 기록')
          PYEOF

      - name: Commit & push data.json
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add data.json
          git diff --staged --quiet && echo "변경사항 없음, 커밋 스킵" || \
            git commit -m "chore: update attendance data $(date -u +%Y-%m-%d) [skip ci]" && \
            git push
