<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>지각추적기-혁명의 배신자</title>
<meta name="description" content="망하는데는 다 이유가 있다">
<link rel="icon" type="image/svg+xml" href="./favicon.svg">
<meta property="og:title" content="지각추적기-혁명의 배신자">
<meta property="og:description" content="망하는데는 다 이유가 있다">
<meta property="og:image" content="https://sunune.github.io/attendance-dashboard/social%20preview.webp">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="지각추적기-혁명의 배신자">
<meta name="twitter:description" content="망하는데는 다 이유가 있다">
<meta name="twitter:image" content="https://sunune.github.io/attendance-dashboard/social%20preview.webp">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', sans-serif;
  background: #f5f0e8;
  color: #1a1a2e;
  min-height: 100vh;
  padding: 36px 44px;
  max-width: 1200px;
  margin: 0 auto;
}

/* ── Metric Cards ── */
.metrics {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 14px;
  margin-bottom: 28px;
}
.card {
  background: #fff;
  border-radius: 14px;
  padding: 18px 22px;
  border: 1px solid #e8e3da;
  cursor: default;
  transition: box-shadow 0.15s;
}
.card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.07); }
.card.emp-card { border-top: 3px solid; }
.card-label { font-size: 12px; color: #9a9aaa; margin-bottom: 8px; }
.card-value { font-size: 24px; font-weight: 700; letter-spacing: -0.5px; }
.card-sub { font-size: 11px; color: #bbb; margin-top: 6px; }

/* ── Card Tooltip ── */
#card-tooltip {
  position: fixed;
  pointer-events: none;
  z-index: 999;
  display: none;
  background: #fff;
  border: 1px solid #e8e3da;
  border-radius: 10px;
  padding: 12px 16px;
  box-shadow: 0 4px 18px rgba(0,0,0,0.10);
  min-width: 170px;
}
.tt-title { font-size: 11px; color: #9a9aaa; margin-bottom: 10px; }
.tt-track {
  position: relative;
  height: 8px;
  background: #f5f0e8;
  border-radius: 4px;
  margin-bottom: 8px;
}
.tt-center {
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
  width: 1.5px;
  height: 14px;
  top: -3px;
  background: #ccc;
}
.tt-bar { position: absolute; height: 8px; transition: none; }
.tt-delta { font-size: 15px; font-weight: 700; }

/* ── Filter Row ── */
.filter-row {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: nowrap;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
}
.filter-label { font-size: 13px; color: #9a9aaa; white-space: nowrap; }
.filter-group { display: flex; gap: 6px; }
.btn {
  padding: 6px 18px;
  border-radius: 20px;
  border: 1px solid #ddd8d0;
  background: transparent;
  color: #6a6a7a;
  font-size: 13px;
  cursor: pointer;
  transition: all 0.12s;
  font-family: inherit;
  white-space: nowrap;
}
.btn:hover { border-color: #bbb; color: #1a1a2e; }
.btn.active {
  background: #1a1a2e;
  border-color: #1a1a2e;
  color: #fff;
  font-weight: 500;
}
.divider-v { width: 1px; height: 22px; background: #ddd8d0; margin: 0 2px; }

/* ── Chart Container ── */
.chart-wrap {
  background: #fff;
  border-radius: 14px;
  padding: 24px 26px 20px;
  border: 1px solid #e8e3da;
  margin-bottom: 20px;
}
.legend {
  display: flex;
  gap: 22px;
  flex-wrap: wrap;
  margin-bottom: 14px;
}
.legend-item {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 12px;
  color: #5a5a6a;
}
.legend-sq {
  width: 14px;
  height: 8px;
  border-radius: 3px;
}
#chart { display: block; user-select: none; }

/* ── Summary Table (4 columns) ── */
.summary-table {
  background: #fff;
  border-radius: 14px;
  border: 1px solid #e8e3da;
  overflow: hidden;
}
.tbl-header {
  display: grid;
  grid-template-columns: 1fr 4fr 1fr 4fr;
  padding: 12px 28px;
  font-size: 12px;
  color: #9a9aaa;
  border-bottom: 1px solid #ede8e0;
  gap: 12px;
  align-items: center;
}
.tbl-row {
  display: grid;
  grid-template-columns: 1fr 4fr 1fr 4fr;
  padding: 0 28px;
  border-bottom: 1px solid #f2ede6;
  gap: 12px;
  align-items: stretch;
  min-height: 72px;
}
.tbl-row:last-child { border-bottom: none; }
.emp-name {
  font-size: 15px;
  font-weight: 600;
  display: flex;
  align-items: center;
}
.avg-time {
  font-size: 14px;
  display: flex;
  align-items: center;
}

/* ── Leave Dots ── */
.leave-wrap {
  display: flex;
  align-items: center;
  cursor: default;
  padding: 20px 0;
}
.leave-dots { display: flex; flex-wrap: wrap; gap: 5px; }
.dot {
  width: 11px;
  height: 11px;
  border-radius: 50%;
  background: #eeece8;
}

/* ── Table Row Tooltip ── */
#tbl-tooltip {
  position: fixed;
  pointer-events: none;
  z-index: 999;
  display: none;
  background: #fff;
  border: 1px solid #e8e3da;
  border-radius: 10px;
  padding: 10px 14px;
  box-shadow: 0 4px 18px rgba(0,0,0,0.10);
  font-size: 13px;
  color: #1a1a2e;
  white-space: nowrap;
  line-height: 1.5;
}
.tbl-tt-count { font-size: 18px; font-weight: 700; }
.tbl-tt-label { font-size: 11px; color: #9a9aaa; margin-top: 2px; }

/* ── Deviation Bar ── */
.dev-wrap {
  display: flex;
  align-items: center;
  gap: 14px;
  cursor: default;
  padding: 20px 0;
}
.dev-text { min-width: 56px; }
.dev-delta { font-size: 13px; font-weight: 600; }
.dev-track {
  flex: 1;
  height: 8px;
  position: relative;
  display: flex;
  align-items: center;
  background: #eeece8;
  border-radius: 4px;
}
.dev-center-line {
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
  width: 1.5px;
  height: 14px;
  background: #aaa;
  border-radius: 0;
}
.dev-bar {
  position: absolute;
  height: 8px;
}

@media (max-width: 900px) {
  body { padding: 20px 16px; }
  .metrics { grid-template-columns: repeat(2, 1fr); }
  .tbl-header, .tbl-row {
    grid-template-columns: 1fr 4fr 1fr 4fr;
    font-size: 12px;
  }
}
</style>
</head>
<body>

<!-- Table Row Tooltip -->
<div id="tbl-tooltip"></div>

<!-- Card Tooltip -->
<div id="card-tooltip">
  <div class="tt-title">편차</div>
  <div class="tt-track">
    <div class="tt-center"></div>
    <div class="tt-bar" id="tt-bar"></div>
  </div>
  <div class="tt-delta" id="tt-delta"></div>
</div>

<!-- Metric Cards -->
<div class="metrics">
  <div class="card" id="card-overall">
    <div class="card-label">전체 평균 출근</div>
    <div class="card-value" id="m-overall" style="color:#1a1a2e">—</div>
    <div class="card-sub">전체 직원 · 1년</div>
  </div>
  <div class="card emp-card" id="card-강성준" style="border-top-color:#3266ad">
    <div class="card-label">강성준 평균 출근</div>
    <div class="card-value" id="m-강성준" style="color:#3266ad">—</div>
    <div class="card-sub">2026 연간 평균</div>
  </div>
  <div class="card emp-card" id="card-이경희" style="border-top-color:#D85A30">
    <div class="card-label">이경희 평균 출근</div>
    <div class="card-value" id="m-이경희" style="color:#D85A30">—</div>
    <div class="card-sub">2026 연간 평균</div>
  </div>
  <div class="card emp-card" id="card-임재우" style="border-top-color:#1D9E75">
    <div class="card-label">임재우 평균 출근</div>
    <div class="card-value" id="m-임재우" style="color:#1D9E75">—</div>
    <div class="card-sub">2026 연간 평균</div>
  </div>
</div>

<!-- Filters & Chart-->
<div style="display:flex; gap:8px; flex-direction:column;">

  <!-- Filters -->
  <div class="filter-row">
    <span class="filter-label">기간</span>
    <div class="filter-group" id="period-btns">
      <button class="btn" data-period="day">일</button>
      <button class="btn active" data-period="week">주</button>
      <button class="btn" data-period="month">월</button>
    </div>
    <div class="divider-v"></div>
    <span class="filter-label">직원</span>
    <div class="filter-group" id="emp-btns">
      <button class="btn active" data-emp="all">전체</button>
      <button class="btn" data-emp="강성준">강성준</button>
      <button class="btn" data-emp="이경희">이경희</button>
      <button class="btn" data-emp="임재우">임재우</button>
    </div>
  </div>

  <!-- Chart -->
  <div class="chart-wrap">
    <div class="legend" id="legend"></div>
    <canvas id="chart"></canvas>
  </div>

</div>

<!-- Summary Table -->
<div class="summary-table">
  <div class="tbl-header">
    <span>직원</span>
    <span>연차 (병가 제외)</span>
    <span>평균 출근</span>
    <span>편차</span>
  </div>
  <div id="tbl-body"></div>
</div>

<script>
// ─── Constants ───────────────────────────────────────────
const EMPLOYEES = ['강성준', '이경희', '임재우'];
const COLORS    = { '강성준': '#3266ad', '이경희': '#D85A30', '임재우': '#1D9E75' };
const BASELINE  = 9 * 60 + 30; // 09:30 in minutes
const TOTAL_LEAVE = 15;

// ─── Helpers ─────────────────────────────────────────────
function toMins(t) {
  if (!t) return null;
  const [h, m] = t.split(':').map(Number);
  return h * 60 + m;
}
function fmtMins(mins) {
  if (mins == null || isNaN(mins)) return '—';
  const h = Math.floor(mins / 60), m = Math.round(mins % 60);
  const ampm = h < 12 ? 'AM' : 'PM';
  const hh = h > 12 ? h - 12 : h === 0 ? 12 : h;
  return `${ampm} ${String(hh).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
}
function getWeekNum(dateStr) {
  const d = new Date(dateStr);
  const jan1 = new Date(d.getFullYear(), 0, 1);
  return Math.ceil(((d - jan1) / 86400000 + jan1.getDay() + 1) / 7);
}
function computeYMax() {
  let maxMins = 0;
  allRecords.forEach(rec => {
    rec.arrivals?.forEach(a => {
      const m = toMins(a.time);
      if (m != null && m > maxMins) maxMins = m;
    });
  });
  if (maxMins === 0) return 14 * 60; // fallback
  // latest hour + 1, e.g. latest 13:47 → yMax 14:00; latest 13:00 → yMax 14:00
  return (Math.floor(maxMins / 60) + 1) * 60;
}

// ─── State ───────────────────────────────────────────────
let allRecords   = [];
let activePeriod = 'week';
let activeEmp    = 'all';
let viewOffset   = 0;
let viewWindow   = null; // null = use default window size
let chartInst    = null;
let yMin = 7 * 60;   // 07:00 default floor (adjustable via Y-wheel)
let yMaxCache = 0;   // computed from data on each renderChart()

// ─── Load Data ───────────────────────────────────────────
function isWeekday(dateStr) {
  const dow = new Date(dateStr).getDay();
  return dow !== 0 && dow !== 6;
}

async function loadData() {
  try {
    const r = await fetch('./data.json?' + Date.now());
    if (r.ok) {
      const d = await r.json();
      if (d.records) allRecords = d.records.filter(rec => isWeekday(rec.date));
    }
  } catch(e) {}
  renderAll();
}

// ─── Aggregate ───────────────────────────────────────────
function aggregate() {
  if (activePeriod === 'day') {
    return allRecords.map(rec => {
      const pt = { label: rec.date.slice(5) };
      EMPLOYEES.forEach(n => {
        const a = rec.arrivals?.find(x => x.name === n);
        pt[n] = a ? toMins(a.time) : null;
      });
      return pt;
    });
  }
  const buckets = {};
  allRecords.forEach(rec => {
    let key;
    if (activePeriod === 'week') {
      const d = new Date(rec.date);
      key = `${d.getFullYear()}-W${String(getWeekNum(rec.date)).padStart(2,'0')}`;
    } else {
      key = rec.date.slice(0, 7);
    }
    if (!buckets[key]) buckets[key] = { label: key, s: {}, c: {} };
    EMPLOYEES.forEach(n => {
      const a = rec.arrivals?.find(x => x.name === n);
      if (a) {
        const m = toMins(a.time);
        if (m != null) { buckets[key].s[n] = (buckets[key].s[n] || 0) + m; buckets[key].c[n] = (buckets[key].c[n] || 0) + 1; }
      }
    });
  });
  return Object.values(buckets).map(b => {
    const pt = { label: b.label };
    EMPLOYEES.forEach(n => { pt[n] = b.c[n] ? b.s[n] / b.c[n] : null; });
    return pt;
  });
}

function defaultWindowSize(total) {
  if (activePeriod === 'day')  return Math.min(30, total);
  if (activePeriod === 'week') return Math.min(52, total);
  return Math.min(12, total);
}

function windowSize(total) {
  if (viewWindow !== null) return Math.max(3, Math.min(total, viewWindow));
  return defaultWindowSize(total);
}

function getSlice(agg) {
  const total = agg.length;
  const wSize  = windowSize(total);
  const maxOff = Math.max(0, total - wSize);
  viewOffset   = Math.max(0, Math.min(viewOffset, maxOff));
  const start  = total - wSize - viewOffset;
  return agg.slice(Math.max(0, start), start + wSize);
}

// ─── Metrics ─────────────────────────────────────────────
function renderMetrics() {
  const empMins = {}; const all = [];
  EMPLOYEES.forEach(e => empMins[e] = []);
  allRecords.forEach(rec => {
    rec.arrivals?.forEach(a => {
      const m = toMins(a.time);
      if (m != null) { all.push(m); empMins[a.name]?.push(m); }
    });
  });
  const avg = a => a.length ? a.reduce((x,y)=>x+y,0)/a.length : null;
  document.getElementById('m-overall').textContent = fmtMins(avg(all));
  EMPLOYEES.forEach(e => { document.getElementById('m-'+e).textContent = fmtMins(avg(empMins[e])); });
}

// ─── Legend ──────────────────────────────────────────────
function renderLegend() {
  const empMins = {};
  EMPLOYEES.forEach(e => empMins[e] = []);
  allRecords.forEach(rec => rec.arrivals?.forEach(a => {
    const m = toMins(a.time); if (m!=null) empMins[a.name]?.push(m);
  }));
  const avg = a => a.length ? a.reduce((x,y)=>x+y,0)/a.length : null;
  const visible = activeEmp === 'all' ? EMPLOYEES : [activeEmp];
  document.getElementById('legend').innerHTML = visible.map(e =>
    `<div class="legend-item">
      <div class="legend-sq" style="background:${COLORS[e]}"></div>
      <span>${e} · 평균 ${fmtMins(avg(empMins[e]))}</span>
    </div>`).join('');
}

// ─── Chart ───────────────────────────────────────────────
function buildDatasets(slice) {
  const visible = activeEmp === 'all' ? EMPLOYEES : [activeEmp];
  return visible.map(name => ({
    label: name,
    data: slice.map(p => p[name]),
    borderColor: COLORS[name],
    backgroundColor: 'transparent',
    borderWidth: 2,
    pointRadius: 0,
    pointHoverRadius: 0,
    spanGaps: true,
    tension: 0.35,
  }));
}

function createChart(slice) {
  const ctx = document.getElementById('chart').getContext('2d');
  if (chartInst) chartInst.destroy();
  chartInst = new Chart(ctx, {
    type: 'line',
    data: { labels: slice.map(p => p.label), datasets: buildDatasets(slice) },
    options: {
      responsive: true,
      animation: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#fff',
          borderColor: '#e8e3da',
          borderWidth: 1,
          titleColor: '#9a9aaa',
          bodyColor: '#1a1a2e',
          padding: 10,
          callbacks: { label: c => ` ${c.dataset.label}: ${fmtMins(c.raw)}` }
        }
      },
      scales: {
        x: {
          grid: { color: '#f0ebe3' },
          ticks: { color: '#bbb', font: { size: 11 }, maxTicksLimit: 13, maxRotation: 0 }
        },
        y: {
          grid: { color: '#f0ebe3' },
          min: yMin, max: yMaxCache,
          ticks: {
            color: '#bbb', font: { size: 11 },
            stepSize: 60,
            callback: v => fmtMins(v)
          }
        }
      }
    }
  });
}

function renderChart() {
  yMaxCache = computeYMax();
  // ensure yMin doesn't exceed yMax - 60
  yMin = Math.min(yMin, yMaxCache - 60);
  const agg   = aggregate();
  const slice = getSlice(agg);
  createChart(slice);
}

// ─── Mouse Wheel Zoom ─────────────────────────────────────
document.getElementById('chart').addEventListener('wheel', e => {
  e.preventDefault();
  const inYAxis = chartInst && e.offsetX < chartInst.chartArea.left;

  if (inYAxis) {
    // Y-axis zoom: scroll up = zoom in (narrow range), scroll down = zoom out (wider range)
    const yMax = yMaxCache || computeYMax();
    const range = yMax - yMin;
    const factor = e.deltaY > 0 ? 1.08 : 0.92;
    const newRange = Math.max(60, Math.min(yMax - 360, range * factor));
    yMin = Math.round(Math.max(360, yMax - newRange));
  } else {
    // X-axis zoom: scroll up = zoom in (fewer points), scroll down = zoom out
    const agg = aggregate();
    const total = agg.length;
    const current = windowSize(total);
    const factor = e.deltaY > 0 ? 1.08 : 0.93;
    viewWindow = Math.max(3, Math.min(total, Math.round(current * factor)));
  }
  renderChart();
}, { passive: false });

// ─── Card Tooltip ─────────────────────────────────────────
const cardTooltip = document.getElementById('card-tooltip');

function empAvgMins() {
  const empMins = {};
  EMPLOYEES.forEach(e => empMins[e] = []);
  const all = [];
  allRecords.forEach(rec => {
    rec.arrivals?.forEach(a => {
      const m = toMins(a.time);
      if (m != null) { all.push(m); empMins[a.name]?.push(m); }
    });
  });
  const avg = a => a.length ? a.reduce((s,v)=>s+v,0)/a.length : null;
  const result = { overall: avg(all) };
  EMPLOYEES.forEach(e => { result[e] = avg(empMins[e]); });
  return result;
}

function showCardTooltip(e, cardId) {
  const avgs = empAvgMins();
  let avgM, color;
  if (cardId === 'card-overall') {
    avgM  = avgs.overall;
    color = '#1a1a2e';
  } else {
    const name = cardId.replace('card-', '');
    avgM  = avgs[name];
    color = COLORS[name];
  }
  if (avgM == null) return;

  const dev    = Math.round(avgM - BASELINE);
  const absDev = Math.abs(dev);
  const MAX_DEV = 120;
  const pct    = Math.min(absDev / MAX_DEV * 50, 50);
  const devTxt = dev === 0 ? '0분' : dev < 0 ? `-${absDev}분` : `+${dev}분`;
  const barColor = dev > 0 ? '#e85555' : color;

  const bar = document.getElementById('tt-bar');
  if (dev < 0) {
    bar.style.right        = '50%';
    bar.style.left         = 'auto';
    bar.style.width        = pct + '%';
    bar.style.borderRadius = '4px 0 0 4px';
  } else {
    bar.style.left         = '50%';
    bar.style.right        = 'auto';
    bar.style.width        = pct + '%';
    bar.style.borderRadius = '0 4px 4px 0';
  }
  bar.style.background = barColor;

  const delta = document.getElementById('tt-delta');
  delta.textContent = devTxt;
  delta.style.color = barColor;

  cardTooltip.style.display = 'block';
  posCardTooltip(e);
}

function posCardTooltip(e) {
  const vpW = window.innerWidth, vpH = window.innerHeight;
  const tw = cardTooltip.offsetWidth, th = cardTooltip.offsetHeight;
  let x = e.clientX + 16, y = e.clientY - th / 2;
  if (x + tw > vpW - 8) x = e.clientX - tw - 16;
  if (y < 8) y = 8;
  if (y + th > vpH - 8) y = vpH - th - 8;
  cardTooltip.style.left = x + 'px';
  cardTooltip.style.top  = y + 'px';
}

['card-overall', 'card-강성준', 'card-이경희', 'card-임재우'].forEach(id => {
  const el = document.getElementById(id);
  if (!el) return;
  el.addEventListener('mouseenter', e => showCardTooltip(e, id));
  el.addEventListener('mousemove',  e => posCardTooltip(e));
  el.addEventListener('mouseleave', () => { cardTooltip.style.display = 'none'; });
});

// ─── Table (직원 / 연차 / 평균출근 / 출근편차) ──────────────
function renderTable() {
  const empData = {};
  EMPLOYEES.forEach(e => empData[e] = { mins: [], leave: 0 });
  allRecords.forEach(rec => {
    rec.arrivals?.forEach(a => { const m = toMins(a.time); if (m!=null) empData[a.name]?.mins.push(m); });
    rec.absences?.forEach(a => { if (a.type === '연차') empData[a.name].leave++; });
  });
  const avg = a => a.length ? a.reduce((x,y)=>x+y,0)/a.length : null;
  const MAX_DEV = 120;

  document.getElementById('tbl-body').innerHTML = EMPLOYEES.map(name => {
    const d = empData[name];
    const avgM = avg(d.mins);
    const dev  = avgM != null ? Math.round(avgM - BASELINE) : null;
    const absDev = dev != null ? Math.abs(dev) : 0;
    const devTxt = dev == null ? '—' : dev === 0 ? '0분' : dev < 0 ? `-${absDev}분` : `+${dev}분`;
    const devColor = dev != null && dev > 0 ? '#e85555' : COLORS[name];
    const barPct = Math.min(absDev / MAX_DEV * 50, 50);

    // Inner end (touching center line) has radius 0; outer end rounded
    let barStyle;
    if (dev != null && dev < 0) {
      barStyle = `right:50%; left:auto; width:${barPct}%; background:${COLORS[name]}; border-radius:4px 0 0 4px;`;
    } else if (dev != null && dev > 0) {
      barStyle = `left:50%; right:auto; width:${barPct}%; background:#e85555; border-radius:0 4px 4px 0;`;
    } else {
      barStyle = `left:50%; width:0;`;
    }

    const dots = Array.from({ length: TOTAL_LEAVE }, (_, i) =>
      `<div class="dot" style="${i < d.leave ? `background:${COLORS[name]}` : ''}"></div>`
    ).join('');

    return `
      <div class="tbl-row">
        <div class="emp-name" style="color:${COLORS[name]}">${name}</div>
        <div class="leave-wrap" data-leave="${d.leave}" data-total="${TOTAL_LEAVE}" data-color="${COLORS[name]}">
          <div class="leave-dots">${dots}</div>
        </div>
        <div class="avg-time" style="color:${COLORS[name]}">${fmtMins(avgM)}</div>
        <div class="dev-wrap" data-dev="${dev != null ? dev : ''}" data-color="${COLORS[name]}">
          <div class="dev-text">
            <div class="dev-delta" style="color:${devColor}">${devTxt}</div>
          </div>
          <div class="dev-track">
            <div class="dev-center-line"></div>
            <div class="dev-bar" style="${barStyle}"></div>
          </div>
        </div>
      </div>`;
  }).join('');
}

// ─── Table Row Tooltips ───────────────────────────────────
const tblTooltip = document.getElementById('tbl-tooltip');

function posTblTooltip(e) {
  const vpW = window.innerWidth, vpH = window.innerHeight;
  const tw = tblTooltip.offsetWidth, th = tblTooltip.offsetHeight;
  let x = e.clientX + 16, y = e.clientY - th / 2;
  if (x + tw > vpW - 8) x = e.clientX - tw - 16;
  if (y < 8) y = 8;
  if (y + th > vpH - 8) y = vpH - th - 8;
  tblTooltip.style.left = x + 'px';
  tblTooltip.style.top  = y + 'px';
}

document.getElementById('tbl-body').addEventListener('mouseover', e => {
  const leaveEl = e.target.closest('.leave-wrap');
  const devEl   = e.target.closest('.dev-wrap');
  if (leaveEl) {
    const used  = leaveEl.dataset.leave;
    const total = leaveEl.dataset.total;
    const color = leaveEl.dataset.color;
    tblTooltip.innerHTML =
      `<div class="tbl-tt-count" style="color:${color}">${used} / ${total}</div>` +
      `<div class="tbl-tt-label">병가 제외 연차 사용일수</div>`;
    tblTooltip.style.display = 'block';
  } else if (devEl && devEl.dataset.dev !== '') {
    const dev    = parseInt(devEl.dataset.dev);
    const absDev = Math.abs(dev);
    const color  = dev > 0 ? '#e85555' : devEl.dataset.color;
    let msg;
    if (dev === 0)     msg = '09:30에 평균 정시 출근하고 있습니다';
    else if (dev < 0)  msg = `09:30 기준으로 평균 <strong style="color:${color}">${absDev}분</strong> 일찍 출근하고 있습니다`;
    else               msg = `09:30 기준으로 평균 <strong style="color:${color}">${absDev}분</strong> 늦게 출근하고 있습니다`;
    tblTooltip.innerHTML = msg;
    tblTooltip.style.display = 'block';
  } else {
    tblTooltip.style.display = 'none';
  }
});

document.getElementById('tbl-body').addEventListener('mousemove', e => {
  if (tblTooltip.style.display !== 'none') posTblTooltip(e);
});

document.getElementById('tbl-body').addEventListener('mouseleave', () => {
  tblTooltip.style.display = 'none';
});

// ─── Filter Events ────────────────────────────────────────
document.getElementById('period-btns').addEventListener('click', e => {
  const btn = e.target.closest('.btn'); if (!btn) return;
  document.querySelectorAll('#period-btns .btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  activePeriod = btn.dataset.period;
  viewOffset = 0;
  viewWindow = null;
  yMin = 7 * 60;
  renderChart(); renderLegend();
});

document.getElementById('emp-btns').addEventListener('click', e => {
  const btn = e.target.closest('.btn'); if (!btn) return;
  document.querySelectorAll('#emp-btns .btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  activeEmp = btn.dataset.emp;
  renderChart(); renderLegend();
});

// ─── Init ────────────────────────────────────────────────
function renderAll() { renderMetrics(); renderLegend(); renderChart(); renderTable(); }
loadData();
</script>
